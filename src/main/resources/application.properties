spring.application.name=spring-vulnerable-lab
server.port=8081

spring.datasource.url=jdbc:h2:mem:vulnerablelab
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Sprint 02 - Fase 1, item 8: H2 console desabilitado (vazamento de info)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Sprint 02 - Fase 1, item 10: respostas de erro sem detalhe interno
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Sprint 02 - Fase 2, item 4: segredo e expiração JWT
app.jwt.secret=VulnerableLabSuperSecretKeyForJwtHS256AtLeast256BitsLong!
app.jwt.expiration-ms=3600000
